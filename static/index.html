<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimodal Assistant UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar glass-panel">
            <h1 class="logo">
                <span class="gradient-text">Nova</span>
                <span class="logo-sub">AI Assistant</span>
            </h1>

            <div class="config-section">
                <h3>Persona Style</h3>
                <div class="custom-select">
                    <select id="persona-select">
                        <option value="expert" selected>Expert (Technical)</option>
                        <option value="formal">Formal</option>
                        <option value="casual">Casual (Friendly)</option>
                        <option value="child">Child (Simple)</option>
                    </select>
                </div>
            </div>

            <div class="config-section">
                <h3>Thread Control</h3>
                <button id="btn-clear" class="btn secondary-btn">Clear Conversation</button>
            </div>

            <div class="status-indicator">
                <div id="status-dot" class="dot"></div>
                <span id="connection-status">Checking server...</span>
            </div>
        </aside>

        <main class="chat-container glass-panel">
            <div id="chat-box" class="chat-box">
                <div class="message ai">
                    <div class="avatar">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 2a10 10 0 1 0 10 10H12V2Z"></path><path d="M12 2a10 10 0 1 1-10 10h10V2Z"></path></svg>
                    </div>
                    <div class="bubble">
                        <p>Hello! I am Nova, your Multimodal AI Assistant. I can process images, check the weather, and adapt to different conversation styles. How can I help you today?</p>
                    </div>
                </div>
            </div>

            <div id="image-preview-container" class="hidden">
                <img id="image-preview" src="" alt="Preview">
                <button id="btn-remove-image" title="Remove image">x</button>
            </div>

            <div class="input-area">
                <div class="input-wrapper tooltip-container">
                    <label for="image-upload" class="upload-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </label>
                    <input type="file" id="image-upload" accept="image/*" hidden>

                    <input type="text" id="chat-input" placeholder="Type a message or upload an image..." autocomplete="off">

                    <button id="btn-send" class="btn primary-btn">
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
